name: Build and Push Docker Images

on: [push]

# Use the built-in GITHUB_TOKEN (auto-provisioned per run) instead of a
# long-lived PAT — least privilege, nothing to rotate or leak.
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pure-Python (stdlib-only) reporter — multi-arch so Linux x86 hosts and
      # Apple Silicon Macs pull the same tag natively. Built first so it is not
      # gated behind the legacy amd64 images below.
      - name: Build and push claude-usage-exporter (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./claude-usage-exporter
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dockerfiles/claude-usage-exporter:latest

      # Health gate: pull the just-pushed image and confirm it actually runs and
      # parses (empty input -> "parsed 0 transcripts", exit 0). Catches a broken
      # publish before any host pulls it.
      - name: Smoke-test the reporter image
        run: |
          IMG=ghcr.io/${{ github.repository_owner }}/dockerfiles/claude-usage-exporter:latest
          docker pull "$IMG"
          mkdir -p /tmp/empty-projects
          out=$(docker run --rm -v /tmp/empty-projects:/projects:ro "$IMG" --print --projects-dir=/projects)
          echo "$out"
          echo "$out" | grep -q "parsed 0 transcripts" || { echo "::error::reporter image smoke test failed"; exit 1; }

      # frp and snell hardcode amd64 release downloads, so they stay amd64-only.
      # continue-on-error: these legacy packages predate GITHUB_TOKEN and may
      # need a one-time package->repo link in ghcr settings; don't let them block
      # the run or the reporter image above.
      - name: Build and push Docker images (amd64)
        continue-on-error: true
        run: |
          for DIR in frp snell; do
            echo "Building Docker image for $DIR"
            docker build -t ghcr.io/${{ github.repository_owner }}/dockerfiles/$DIR:latest $DIR
            echo "Pushing Docker image for $DIR"
            docker push ghcr.io/${{ github.repository_owner }}/dockerfiles/$DIR:latest
          done
