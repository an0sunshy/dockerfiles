name: Build and Push Docker Images

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      # frp and snell hardcode amd64 release downloads, so they stay amd64-only.
      - name: Build and push Docker images (amd64)
        run: |
          for DIR in frp snell; do
            echo "Building Docker image for $DIR"
            docker build -t ghcr.io/${{ github.repository_owner }}/dockerfiles/$DIR:latest $DIR
            echo "Pushing Docker image for $DIR"
            docker push ghcr.io/${{ github.repository_owner }}/dockerfiles/$DIR:latest
            echo "$DIR=ghcr.io/${{ github.repository_owner }}/dockerfiles/$DIR:latest" >> $GITHUB_ENV
          done

      # Pure-Python (stdlib-only) reporter — multi-arch so Linux x86 hosts and
      # Apple Silicon Macs pull the same tag natively.
      - name: Build and push claude-usage-exporter (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./claude-usage-exporter
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dockerfiles/claude-usage-exporter:latest
